<P class=MsoNormal style="MARGIN: 0cm"><FONT size=3><FONT face=等线>当你完成了某种仪式或获得某种恩赐时，你的种族将会受到影响。一个金属龙裔获得了巴哈姆特的青睐时，在庞大神力的赐福下可能进化为铂金龙裔，一个提夫林在沐浴完九狱的力量后，也可能会成为一个魔鬼。<SPAN 
lang=EN-US><o:p></o:p></SPAN></FONT></FONT></P>
<P class=MsoNormal style="MARGIN: 0cm"><SPAN 
lang=EN-US><o:p>&nbsp;这些种族在选取时，需要占用一定的开卡等级，如DM要求3级开卡而你选择了铂金龙裔作为起始种族，则你的开卡等级为2，作为补偿，你获得一枚D10的生命骰。需要注意的是，种族并不是职业，种族没有等级也不会提供熟练加值。</o:p></SPAN></P></body>
